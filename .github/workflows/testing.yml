name: Test Package

on:
  pull_request:
    branches:
      - '**'

jobs:
  lint_and_test:
    name: Linting and Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: extractions/setup-just@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo install protoc-gen-prost-crate@0.5.0
      - name: generated grpc code
        run: just
      - name: verify no generated drift
        run: |
          if ! git diff --exit-code crates/zitadel-gen/src/api/; then
            echo "ERROR: generated output differs from committed state. Run 'just' locally and commit the result."
            exit 1
          fi
      - run: cargo clippy --all-features --no-deps
      - run: cargo test --all-features
